name: Despliegue Continuo VZeta a AWS

on:
  push:
    branches:
      - main

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Clonar código fuente de GitHub
        uses: actions/checkout@v4

      - name: Copiar archivos al servidor de AWS
        uses: appleboy/scp-action@master
        with:
          host: ${{ secrets::SSH_HOST }}
          username: ${{ secrets::SSH_USER }}
          key: ${{ secrets::SSH_KEY }}
          source: "."
          target: "/home/ubuntu/vzeta-app"

      - name: Levantar la aplicación con Docker Compose en AWS
        uses: appleboy/ssh-action@master
        with:
          host: ${{ secrets::SSH_HOST }}
          username: ${{ secrets::SSH_USER }}
          key: ${{ secrets::SSH_KEY }}
          script: |
            cd /home/ubuntu/vzeta-app
            # Detener y limpiar contenedores antiguos si existen
            docker compose down || true
            # Construir imágenes y levantar los nuevos contenedores en segundo plano
            docker compose up --build -d
            # Limpiar imágenes o contenedores basura que hayan quedado sueltos
            docker system prune -f