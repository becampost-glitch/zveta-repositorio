version: '3.8'

services:
  myapp:
    image: bcamposrial/myapp:latest
    container_name: myapp_container
    expose:
      - "80"
    volumes:
      - ./myapp:/usr/share/nginx/html
    restart: always

  nginx:
    image: bcamposrial/nginx_proxy:latest
    container_name: mynginx_container
    ports:
      - "80:80"
    depends_on:
      - myapp
    restart: always